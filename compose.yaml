services:
  postgres:
    image: postgres:16-alpine
    container_name: SentriX-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: SentriX
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - SentriX-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SentriX"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  SentriX-postgres-data: